<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Калькулятор растаможки - тест</title>
    <style>
        body { font-family: Arial; padding: 20px; max-width: 500px; margin: 0 auto; }
        .card { background: white; border-radius: 16px; padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .btn { background: #27ae60; color: white; padding: 12px; border: none; border-radius: 40px; width: 100%; margin-top: 8px; cursor: pointer; }
        input, select { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; }
        .status { margin-top: 10px; padding: 10px; border-radius: 8px; display: none; }
        .status.success { background: #d4edda; color: #155724; display: block; }
        .status.error { background: #f8d7da; color: #721c24; display: block; }
    </style>
</head>
<body>
    <h1>🚗 Тест сохранения</h1>
    
    <div class="card">
        <h3>Курсы валют</h3>
        <label>USD → RUB:</label>
        <input type="number" id="usd" step="0.01" value="77.52">
        
        <label>EUR → RUB:</label>
        <input type="number" id="eur" step="0.01" value="92.08">
        
        <label>CNY → RUB:</label>
        <input type="number" id="cny" step="0.01" value="11.35">
        
        <label>JPY → RUB (за 100):</label>
        <input type="number" id="jpy" step="0.01" value="51.50">
        
        <button class="btn" onclick="saveToServer()">💾 Сохранить на сервер</button>
        <button class="btn" onclick="loadFromServer()" style="background: #3498db;">🔄 Загрузить с сервера</button>
        <div id="status" class="status"></div>
    </div>
    
    <div class="card">
        <h3>Текущие значения на сервере:</h3>
        <pre id="serverValues" style="background: #f0f0f0; padding: 10px; border-radius: 8px;">Загрузка...</pre>
    </div>

<script>
    var API_URL = "https://car-calc-api.onrender.com/settings";
    var SAVE_URL = "https://car-calc-api.onrender.com/save";
    
    function showStatus(message, isError) {
        var statusDiv = document.getElementById("status");
        statusDiv.textContent = message;
        statusDiv.className = "status " + (isError ? "error" : "success");
        setTimeout(function() {
            statusDiv.className = "status";
        }, 3000);
    }
    
    async function loadFromServer() {
        showStatus("Загрузка с сервера...", false);
        try {
            var response = await fetch(API_URL);
            var data = await response.json();
            
            if (data && data.rates) {
                document.getElementById("usd").value = data.rates.usd || 77.52;
                document.getElementById("eur").value = data.rates.eur || 92.08;
                document.getElementById("cny").value = data.rates.cny || 11.35;
                document.getElementById("jpy").value = data.rates.jpy || 51.50;
                
                document.getElementById("serverValues").innerHTML = JSON.stringify(data.rates, null, 2);
                showStatus("✅ Данные загружены с сервера!", false);
            }
        } catch(e) {
            console.error(e);
            showStatus("❌ Ошибка загрузки: " + e.message, true);
        }
    }
    
    async function saveToServer() {
        var rates = {
            usd: parseFloat(document.getElementById("usd").value),
            eur: parseFloat(document.getElementById("eur").value),
            cny: parseFloat(document.getElementById("cny").value),
            jpy: parseFloat(document.getElementById("jpy").value),
            krw: 16.89,
            krw_usd: 1474.93,
            eur_cb: 87.77
        };
        
        showStatus("Сохранение на сервер...", false);
        
        try {
            var response = await fetch(SAVE_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ rates: rates })
            });
            
            var result = await response.json();
            console.log("Ответ сервера:", result);
            
            if (response.ok) {
                showStatus("✅ Данные сохранены на сервере!", false);
                await loadFromServer();
            } else {
                showStatus("❌ Ошибка: " + (result.message || "Неизвестная ошибка"), true);
            }
        } catch(e) {
            console.error("Ошибка:", e);
            showStatus("❌ Ошибка сохранения: " + e.message, true);
        }
    }
    
    // Загружаем данные при старте
    loadFromServer();
</script>
</body>
</html>
