<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Калькулятор растаможки - тест сохранения</title>
    <style>
        body { font-family: Arial; padding: 20px; max-width: 500px; margin: 0 auto; }
        .card { background: white; border-radius: 16px; padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .btn { background: #27ae60; color: white; padding: 12px; border: none; border-radius: 40px; width: 100%; margin-top: 8px; cursor: pointer; }
        .btn-blue { background: #3498db; }
        input, select { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; }
        .status { margin-top: 10px; padding: 10px; border-radius: 8px; display: none; }
        .status.success { background: #d4edda; color: #155724; display: block; }
        .status.error { background: #f8d7da; color: #721c24; display: block; }
        .rates-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .rates-item { display: flex; justify-content: space-between; padding: 5px 0; }
    </style>
</head>
<body>
    <h1>🚗 Калькулятор растаможки</h1>
    
    <div class="card">
        <h3>📝 Параметры автомобиля</h3>
        <label>Страна ввоза:</label>
        <select id="country">
            <option value="japan">🇯🇵 Япония</option>
            <option value="china">🇨🇳 Китай</option>
            <option value="korea">🇰🇷 Корея</option>
        </select>
        
        <label>Цена покупки (в валюте страны):</label>
        <input type="number" id="price" value="1000000">
        
        <label>Объём двигателя (см³):</label>
        <input type="number" id="volume" value="1998">
        
        <label>Возраст автомобиля:</label>
        <select id="age">
            <option value="1">Младше 3 лет</option>
            <option value="3">От 3 до 5 лет</option>
            <option value="5">Старше 5 лет</option>
        </select>
    </div>
    
    <div class="card">
        <h3>📊 Курсы валют</h3>
        <div class="rates-grid" id="ratesGrid"></div>
        <button class="btn btn-blue" id="updateBtn">🔄 Обновить курсы с сервера</button>
        <div id="status" class="status"></div>
    </div>
    
    <div class="total" style="text-align: center; padding: 20px; background: #27ae60; color: white; border-radius: 20px;">
        <div>💰 ИТОГОВАЯ СТОИМОСТЬ</div>
        <div style="font-size: 24px; font-weight: bold;" id="totalValue">0 ₽</div>
    </div>
    
    <div style="margin-top: 20px; padding: 16px; background: #fef9e7; border-radius: 16px;">
        <h3>👑 Админ-панель</h3>
        <div id="adminRates"></div>
        <button class="btn" id="saveBtn">💾 Сохранить настройки на сервер</button>
    </div>
    
    <div class="contacts" style="text-align: center; margin-top: 20px; padding: 12px; background: #f8f9fa; border-radius: 16px;">
        <div>📢 Хотите заказать автомобиль?</div>
        <div>🇯🇵 Япония | 🇰🇷 Корея | 🇨🇳 Китай</div>
        <div>📱 Telegram: @autozakaz_jpn_korea</div>
        <div>📞 Телефон: +7 (983) 270-35-01</div>
    </div>

<script>
    // ==================== АДРЕС СЕРВЕРА ====================
    var API_URL = "https://car-calc-api.onrender.com/settings";
    var SAVE_URL = "https://car-calc-api.onrender.com/save";
    
    // ==================== НАСТРОЙКИ ====================
    var settings = {
        rates: {
            usd: 77.52,
            eur: 92.08,
            cny: 11.35,
            jpy: 51.50,
            krw: 16.89,
            krw_usd: 1450.0,
            eur_cb: 89.63
        },
        countryCosts: {
            japan: { localExpenses: 220000, brokerFee: 27000, currencyName: "йен" },
            china: { localExpenses: 12500, brokerFee: 65000, currencyName: "юаней" },
            korea: { localExpenses: 2000000, brokerFee: 85000, currencyName: "вон" }
        },
        fixedCosts: { customsFee: 1300, waycar: 60000 }
    };
    
    var currentAge = 2;
    
    function showStatus(message, isError) {
        var statusDiv = document.getElementById("status");
        statusDiv.textContent = message;
        statusDiv.className = "status " + (isError ? "error" : "success");
        setTimeout(function() { statusDiv.className = "status"; }, 3000);
    }
    
    // ==================== ЗАГРУЗКА С СЕРВЕРА ====================
    async function loadFromServer() {
        showStatus("Загрузка с сервера...", false);
        try {
            var response = await fetch(API_URL);
            var data = await response.json();
            console.log("Загружено с сервера:", data);
            
            if (data && data.rates) {
                settings.rates = data.rates;
                settings.countryCosts = data.countryCosts || settings.countryCosts;
                settings.fixedCosts = data.fixedCosts || settings.fixedCosts;
                
                renderRates();
                renderAdminRates();
                showStatus("✅ Загружено с сервера!", false);
                calculate();
                return true;
            }
        } catch(e) {
            console.error("Ошибка загрузки:", e);
            showStatus("❌ Ошибка загрузки: " + e.message, true);
            return false;
        }
        return false;
    }
    
    // ==================== СОХРАНЕНИЕ НА СЕРВЕР ====================
    async function saveToServer() {
        showStatus("Сохранение на сервер...", false);
        
        var dataToSave = {
            rates: settings.rates,
            countryCosts: settings.countryCosts,
            fixedCosts: settings.fixedCosts
        };
        
        console.log("Отправляем на сервер:", dataToSave);
        
        try {
            var response = await fetch(SAVE_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dataToSave)
            });
            
            var result = await response.json();
            console.log("Ответ сервера:", result);
            
            if (response.ok) {
                showStatus("✅ Сохранено на сервере!", false);
                return true;
            } else {
                showStatus("❌ Ошибка: " + (result.message || "Неизвестная ошибка"), true);
                return false;
            }
        } catch(e) {
            console.error("Ошибка сохранения:", e);
            showStatus("❌ Ошибка: " + e.message, true);
            return false;
        }
    }
    
    // ==================== ОБНОВЛЕНИЕ КУРСОВ ====================
    async function updateRatesFromServer() {
        showStatus("Обновление курсов...", false);
        try {
            var response = await fetch(API_URL);
            var data = await response.json();
            if (data && data.rates) {
                settings.rates = data.rates;
                renderRates();
                renderAdminRates();
                calculate();
                showStatus("✅ Курсы обновлены!", false);
            }
        } catch(e) {
            showStatus("❌ Ошибка обновления", true);
        }
    }
    
    // ==================== РЕДАКТИРОВАНИЕ КУРСОВ ====================
    function editRate(key, currentValue) {
        var newValue = prompt("Введите новое значение для " + key + ":", currentValue);
        if (newValue !== null) {
            var parsed = parseFloat(newValue);
            if (!isNaN(parsed) && parsed > 0) {
                settings.rates[key] = parsed;
                renderRates();
                renderAdminRates();
                calculate();
                showStatus("Курс изменён, нажмите 'Сохранить' для синхронизации", false);
            } else {
                showStatus("Введите корректное число!", true);
            }
        }
    }
    
    function renderRates() {
        var grid = document.getElementById("ratesGrid");
        if (!grid) return;
        
        var ratesList = [
            { label: "USD → RUB:", key: "usd", suffix: " руб" },
            { label: "EUR → RUB:", key: "eur", suffix: " руб" },
            { label: "CNY (юань) → RUB:", key: "cny", suffix: " руб" },
            { label: "JPY (за 100 йен) → RUB:", key: "jpy", suffix: " руб" },
            { label: "KRW (за 100 вон) → RUB:", key: "krw", suffix: " руб" },
            { label: "KRW → USD:", key: "krw_usd", suffix: "" },
            { label: "EUR (ЦБ РФ) для таможни:", key: "eur_cb", suffix: " руб" }
        ];
        
        grid.innerHTML = ratesList.map(item => `
            <div class="rates-item">
                <span>${item.label}</span>
                <span style="cursor:pointer; color:#3498db;" onclick="editRate('${item.key}', ${settings.rates[item.key]})">${settings.rates[item.key].toFixed(2)}${item.suffix}</span>
            </div>
        `).join('');
    }
    
    function renderAdminRates() {
        var container = document.getElementById("adminRates");
        if (!container) return;
        container.innerHTML = 
            '<div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">' +
                '<label>USD:</label><input type="number" id="admin_usd" step="0.01" value="' + settings.rates.usd + '">' +
                '<label>EUR:</label><input type="number" id="admin_eur" step="0.01" value="' + settings.rates.eur + '">' +
                '<label>CNY:</label><input type="number" id="admin_cny" step="0.01" value="' + settings.rates.cny + '">' +
                '<label>JPY (за 100):</label><input type="number" id="admin_jpy" step="0.01" value="' + settings.rates.jpy + '">' +
                '<label>KRW (за 100):</label><input type="number" id="admin_krw" step="0.01" value="' + settings.rates.krw + '">' +
                '<label>KRW → USD:</label><input type="number" id="admin_krw_usd" step="0.01" value="' + settings.rates.krw_usd + '">' +
                '<label>EUR (ЦБ):</label><input type="number" id="admin_eur_cb" step="0.01" value="' + settings.rates.eur_cb + '">' +
            '</div>' +
            '<div style="margin-top:12px;"><strong>📦 Расходы по странам</strong></div>' +
            '<div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">' +
                '<label>Япония (доставка):</label><input type="number" id="admin_japan_exp" value="' + settings.countryCosts.japan.localExpenses + '">' +
                '<label>Япония (брокер):</label><input type="number" id="admin_japan_broker" value="' + settings.countryCosts.japan.brokerFee + '">' +
                '<label>Китай (доставка):</label><input type="number" id="admin_china_exp" value="' + settings.countryCosts.china.localExpenses + '">' +
                '<label>Китай (брокер):</label><input type="number" id="admin_china_broker" value="' + settings.countryCosts.china.brokerFee + '">' +
                '<label>Корея (доставка):</label><input type="number" id="admin_korea_exp" value="' + settings.countryCosts.korea.localExpenses + '">' +
                '<label>Корея (брокер):</label><input type="number" id="admin_korea_broker" value="' + settings.countryCosts.korea.brokerFee + '">' +
            '</div>' +
            '<div style="margin-top:12px;"><strong>💰 Фиксированные расходы</strong></div>' +
            '<div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">' +
                '<label>Таможенный сбор:</label><input type="number" id="admin_customs" value="' + settings.fixedCosts.customsFee + '">' +
                '<label>Компания WayCar:</label><input type="number" id="admin_waycar" value="' + settings.fixedCosts.waycar + '">' +
            '</div>';
    }
    
    async function saveAdminSettings() {
        // Сохраняем курсы
        settings.rates.usd = parseFloat(document.getElementById("admin_usd").value) || settings.rates.usd;
        settings.rates.eur = parseFloat(document.getElementById("admin_eur").value) || settings.rates.eur;
        settings.rates.cny = parseFloat(document.getElementById("admin_cny").value) || settings.rates.cny;
        settings.rates.jpy = parseFloat(document.getElementById("admin_jpy").value) || settings.rates.jpy;
        settings.rates.krw = parseFloat(document.getElementById("admin_krw").value) || settings.rates.krw;
        settings.rates.krw_usd = parseFloat(document.getElementById("admin_krw_usd").value) || settings.rates.krw_usd;
        settings.rates.eur_cb = parseFloat(document.getElementById("admin_eur_cb").value) || settings.rates.eur_cb;
        
        // Сохраняем расходы по странам
        settings.countryCosts.japan.localExpenses = parseFloat(document.getElementById("admin_japan_exp").value) || settings.countryCosts.japan.localExpenses;
        settings.countryCosts.japan.brokerFee = parseFloat(document.getElementById("admin_japan_broker").value) || settings.countryCosts.japan.brokerFee;
        settings.countryCosts.china.localExpenses = parseFloat(document.getElementById("admin_china_exp").value) || settings.countryCosts.china.localExpenses;
        settings.countryCosts.china.brokerFee = parseFloat(document.getElementById("admin_china_broker").value) || settings.countryCosts.china.brokerFee;
        settings.countryCosts.korea.localExpenses = parseFloat(document.getElementById("admin_korea_exp").value) || settings.countryCosts.korea.localExpenses;
        settings.countryCosts.korea.brokerFee = parseFloat(document.getElementById("admin_korea_broker").value) || settings.countryCosts.korea.brokerFee;
        
        // Сохраняем фиксированные расходы
        settings.fixedCosts.customsFee = parseFloat(document.getElementById("admin_customs").value) || settings.fixedCosts.customsFee;
        settings.fixedCosts.waycar = parseFloat(document.getElementById("admin_waycar").value) || settings.fixedCosts.waycar;
        
        renderRates();
        await saveToServer();
    }
    
    // ==================== РАСЧЁТ ====================
    function getCustomsRate(priceEur, volume, age) {
        if (age < 3) {
            var ratePerCm, percent;
            if (priceEur < 8500) { ratePerCm = 2.5; percent = 54; }
            else if (priceEur <= 16700) { ratePerCm = 3.5; percent = 48; }
            else if (priceEur <= 42300) { ratePerCm = 5.5; percent = 48; }
            else if (priceEur <= 84500) { ratePerCm = 7.5; percent = 48; }
            else if (priceEur <= 169000) { ratePerCm = 15.0; percent = 48; }
            else { ratePerCm = 20.0; percent = 48; }
            return Math.max(priceEur * percent / 100, volume * ratePerCm);
        } else if (age < 5) {
            if (volume <= 1000) return volume * 1.5;
            else if (volume <= 1500) return volume * 1.7;
            else if (volume <= 1800) return volume * 2.5;
            else if (volume <= 2300) return volume * 2.7;
            else if (volume <= 3000) return volume * 3.0;
            else return volume * 3.6;
        } else {
            if (volume <= 1000) return volume * 3.0;
            else if (volume <= 1500) return volume * 3.2;
            else if (volume <= 1800) return volume * 3.5;
            else if (volume <= 2300) return volume * 4.8;
            else if (volume <= 3000) return volume * 5.0;
            else return volume * 5.7;
        }
    }
    
    function calculateBankCommission(amountRub) {
        var commission = amountRub * 0.015;
        return Math.max(10000, Math.min(commission, 30000));
    }
    
    function formatNumber(num) {
        return Math.round(num).toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ");
    }
    
    function calculate() {
        var country = document.getElementById("country").value;
        var priceLocal = parseFloat(document.getElementById("price").value) || 0;
        var volume = parseFloat(document.getElementById("volume").value) || 0;
        var age = parseInt(document.getElementById("age").value);
        
        if (priceLocal <= 0 || volume <= 0) {
            document.getElementById("totalValue").innerHTML = "0 ₽";
            return;
        }
        
        var countryData = settings.countryCosts[country];
        var rates = settings.rates;
        
        var priceRub;
        if (country === "japan") {
            priceRub = priceLocal * (rates.jpy / 100);
        } else if (country === "china") {
            priceRub = priceLocal * rates.cny;
        } else {
            var usdAmount = priceLocal / rates.krw_usd;
            priceRub = usdAmount * rates.usd;
        }
        
        var localExpensesRub;
        if (country === "korea") {
            var usdExpenses = countryData.localExpenses / rates.krw_usd;
            localExpensesRub = usdExpenses * rates.usd;
        } else {
            var localToRub = country === "japan" ? rates.jpy/100 : rates.cny;
            localExpensesRub = countryData.localExpenses * localToRub;
        }
        
        var totalWithExpenses = priceRub + localExpensesRub;
        var bankCommission = calculateBankCommission(totalWithExpenses);
        var subtotal = totalWithExpenses + bankCommission + countryData.brokerFee;
        
        var priceForCustomsEur = (priceRub + localExpensesRub) / rates.eur_cb;
        var customsEur = getCustomsRate(priceForCustomsEur, volume, age);
        var customsRub = customsEur * rates.eur_cb;
        
        var utilFee = age < 3 ? 3000 : 5200;
        var totalFixed = settings.fixedCosts.customsFee + utilFee + settings.fixedCosts.waycar;
        var totalRub = subtotal + customsRub + totalFixed;
        
        document.getElementById("totalValue").innerHTML = formatNumber(totalRub) + " ₽";
    }
    
    // ==================== СОБЫТИЯ ====================
    document.getElementById("updateBtn").onclick = updateRatesFromServer;
    document.getElementById("saveBtn").onclick = saveAdminSettings;
    
    document.getElementById("country").onchange = calculate;
    document.getElementById("price").oninput = calculate;
    document.getElementById("volume").oninput = calculate;
    document.getElementById("age").onchange = calculate;
    
    // ==================== ЗАПУСК ====================
    loadFromServer();
</script>
</body>
</html>
